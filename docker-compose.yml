services:
  jamulus-fetch:
    image: ghcr.io/dtinth/jamulus-fetch:latest
    expose:
      - "8080"
    environment:
      - PORT=8080
      # Optional: set these in Dokploy to enable auth / whitelist
      - AUTH_TOKEN
      - ALLOWED_SERVERS
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    restart: unless-stopped
